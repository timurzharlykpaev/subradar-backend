# Reusable security header block. Include from any server { } that serves
# HTTPS traffic.
#
# `always` is essential — without it nginx skips the header on
# error responses (4xx/5xx), and HSTS in particular has to apply to ALL
# responses or browsers won't pin the upgrade.

# Force HTTPS for one year on this domain + subdomains. Stay under
# `preload` until we're confident the cert + DNS are fully stable; once
# we are, bump to includeSubDomains+preload and submit at hstspreload.org.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Prevent MIME sniffing (already at app level, repeat at nginx so it's
# applied even on static + error responses).
add_header X-Content-Type-Options "nosniff" always;

# Don't let other origins frame the API responses.
add_header X-Frame-Options "DENY" always;

# Don't leak path/query to third-party origins on click.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Conservative CSP for an API host — no inline JS/CSS expected here.
# Tighten further once we audit the few static endpoints (legal pages
# would be served from app.subradar.ai, not api.subradar.ai).
add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

# Older but still useful for legacy bots / tooling.
add_header X-XSS-Protection "0" always;
