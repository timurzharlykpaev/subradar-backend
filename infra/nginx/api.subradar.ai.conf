# nginx server block for api.subradar.ai (prod).
#
# Drop-in replacement for /etc/nginx/sites-available/api.subradar.ai.
# Goals over the previous config:
#   1. HTTP/2 (prev was HTTP/1.1) — multiplexes the 5-10 parallel calls
#      mobile makes on every screen, kills head-of-line blocking.
#   2. HSTS + strong TLS — long-overdue security baseline.
#   3. Cache-Control on safe GETs so Cloudflare (and browser caches for
#      web app) can shave the round-trip on hot read paths.
#   4. Tight gzip + brotli on JSON responses — payload reduction of
#      40-70% on /subscriptions, /analytics/*.
#
# IMPORTANT: this expects a Let's Encrypt cert at the standard certbot
# path. If yours sits elsewhere, adjust `ssl_certificate*` only.
#
# Symlink it from sites-enabled:
#   ln -sf /etc/nginx/sites-available/api.subradar.ai \
#          /etc/nginx/sites-enabled/api.subradar.ai
#   nginx -t && systemctl reload nginx

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.subradar.ai;

    # Allow ACME challenges to resolve over plain HTTP so renewal works.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ─────────────────────────────────────────────────────
server {
    # http2 keyword enables HTTP/2 ALPN. http3 enables QUIC if nginx is
    # built with --with-http_v3_module (Ubuntu 24.04's nginx 1.24 has it
    # since the noble repo). Even without h3, h2 alone is the big win.
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    # Uncomment when nginx is built with QUIC (it generally is on noble):
    # listen 443 quic reuseport;
    # listen [::]:443 quic reuseport;
    # add_header Alt-Svc 'h3=":443"; ma=86400' always;

    server_name api.subradar.ai;

    # ─── TLS ──────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.subradar.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.subradar.ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.subradar.ai/chain.pem;

    # Modern TLS only. TLS 1.3 is non-negotiable in 2026; 1.2 stays so
    # iOS 12 / older Android can still hit the API.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Session resumption — saves a round-trip on returning clients.
    # 10m cache holds ~40 000 sessions; tune up if you hit cache misses.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — drops one round-trip from the cert validation path.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ─── Security headers (HSTS, X-Frame-Options, CSP, …) ────────────
    include /etc/nginx/snippets/subradar-security-headers.conf;

    # ─── Compression ─────────────────────────────────────────────────
    # gzip is the universal floor; brotli gives 15-25% extra reduction on
    # JSON when the brotli module is loaded (libnginx-mod-brotli).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/x-font-ttf
        application/vnd.api+json
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types application/json application/javascript text/css text/plain image/svg+xml;

    # ─── Body size — receipts upload (PDF/photo) is the limiter ──────
    client_max_body_size 25m;
    client_body_timeout 60s;
    client_header_timeout 30s;

    # Hide nginx version in `Server:` header.
    server_tokens off;

    # ─── Upstream — NestJS in docker, listening on host port 8082 ────
    # Reuse keep-alive connections instead of opening new TCP per request.
    upstream subradar_api_prod {
        server 127.0.0.1:8082;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # ─── Default proxy block (mostly read endpoints) ─────────────────
    location / {
        proxy_pass http://subradar_api_prod;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        # Long enough for the worst legitimate request (AI screenshot
        # parse can take 15s end-to-end). Anything beyond is broken.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Default cache policy — DON'T cache. Most endpoints are user-
        # specific and auth-scoped. Override per-location below.
        add_header Cache-Control "no-store" always;
    }

    # ─── Cacheable read paths ────────────────────────────────────────
    # These return content that's the SAME for every authenticated user
    # in a given region — perfect for an upstream Cloudflare cache.
    # Cloudflare honours these headers automatically; locally nginx
    # doesn't cache (we don't have proxy_cache_path set up here, but
    # adding one is straightforward when needed).

    # Service catalog: changes maybe weekly. 1 hour is generous.
    location ~ ^/api/v1/catalog/popular(/.*)?$ {
        proxy_pass http://subradar_api_prod;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=300, s-maxage=3600, stale-while-revalidate=600" always;
        add_header Vary "Accept-Encoding, X-Region" always;
    }

    # FX rates: refreshed every 6h backend-side. 5 min on edge is fine.
    location ~ ^/api/v1/fx/rates$ {
        proxy_pass http://subradar_api_prod;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=120, s-maxage=300, stale-while-revalidate=600" always;
    }

    # AI service catalogue lookup — same response for everyone given a
    # name. Worth caching to dodge the OpenAI roundtrip for popular
    # services. 1h, with stale-while-revalidate for robustness.
    location ~ ^/api/v1/ai/service-catalog/.+$ {
        proxy_pass http://subradar_api_prod;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache only successful GETs (the 404 "not found" should not
        # poison the cache; CF respects status code by default).
        add_header Cache-Control "public, max-age=600, s-maxage=3600, stale-while-revalidate=86400" always;
    }

    # Health — explicitly DO NOT cache; we want the real container
    # status every poll.
    location = /api/v1/health {
        proxy_pass http://subradar_api_prod;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        add_header Cache-Control "no-store" always;
        access_log off;
    }

    # ─── Hard-block obvious recon paths ──────────────────────────────
    # Stops scanner traffic from reaching NestJS at all (we already saw
    # /.git/config probes in alerts). Returns 444 (close conn) instead
    # of 404 — burns no JSON-rendering CPU.
    location ~ /\.(git|env|svn|hg|aws|ssh|htpasswd|htaccess) {
        return 444;
    }
}
