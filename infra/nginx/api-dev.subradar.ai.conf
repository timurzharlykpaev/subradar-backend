# Dev mirror of api.subradar.ai.conf — same TLS / HTTP/2 / security
# baseline, but no edge cache (dev should always hit a fresh response so
# we can see new behaviour immediately) and points at the dev container
# on port 8083.

server {
    listen 80;
    listen [::]:80;
    server_name api-dev.subradar.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api-dev.subradar.ai;

    ssl_certificate     /etc/letsencrypt/live/api-dev.subradar.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-dev.subradar.ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api-dev.subradar.ai/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_DEV:5m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    include /etc/nginx/snippets/subradar-security-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/css text/plain;

    client_max_body_size 25m;
    server_tokens off;

    upstream subradar_api_dev {
        server 127.0.0.1:8083;
        keepalive 16;
        keepalive_requests 500;
        keepalive_timeout 60s;
    }

    location / {
        proxy_pass http://subradar_api_dev;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        # Always no-cache on dev so behaviour changes are immediately
        # visible to anyone testing.
        add_header Cache-Control "no-store" always;
    }

    location ~ /\.(git|env|svn|hg|aws|ssh|htpasswd|htaccess) {
        return 444;
    }
}
