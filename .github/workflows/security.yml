# Security CI — closes ASVS V14.1.1 (out-of-date warnings),
# V14.1.2 (SAST in pipeline), V14.1.3 (SCA in pipeline). Runs on every
# push to dev/main and every PR; weekly cron picks up advisories that
# emerge after merge.
#
# This workflow is non-blocking by design: each scanner runs and emits
# findings, but the workflow doesn't fail the deploy unless an obvious
# regression appears (npm audit high/critical). The CASA evidence value
# is "we run these on every push and the SARIF history is available";
# fail-the-build escalation is a follow-up once the baseline is clean.
name: Security

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  schedule:
    # Mondays 03:00 UTC — picks up advisories filed over the weekend.
    - cron: "0 3 * * 1"

# Workflow-level permissions: every job that uploads SARIF needs
# `security-events: write` (CodeQL Action API). Running with the bare
# minimum elsewhere.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  npm-audit:
    name: npm audit (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      # Fail the run on high/critical CVEs in production deps. This is
      # the ONE gating signal — moderate/low advisories are reported
      # but don't block. The long tail of moderate transitive issues
      # rarely rises to "stop the line" severity.
      - name: npm audit (high/critical only)
        run: npm audit --omit=dev --audit-level=high

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v6.0.2
      # Report-only mode. `--severity ERROR --severity WARNING` would
      # fail on every WARNING level finding which is too aggressive
      # for a baseline; we run without `--error` so the workflow
      # documents findings without blocking.
      - run: |
          semgrep \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/nodejs \
            --severity ERROR \
            --sarif \
            --output semgrep.sarif \
            src/ || true
      # SARIF upload may fail on private repos without GitHub Advanced
      # Security (paid). continue-on-error keeps the rest of the
      # workflow alive; the SARIF artifact is still produced.
      - name: Upload SARIF to GitHub code-scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload SARIF as workflow artifact (always available)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 90

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` covers more than `security-extended`
          # and CASA reviewers like to see depth, not just defaults.
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
        continue-on-error: true

  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Full history so leaked-then-removed secrets in old commits
          # don't slip through (`fetch-depth: 1` would miss them).
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # Private-repo scanning requires GITLEAKS_LICENSE; without it
        # the action exits non-zero. Keep the job non-blocking until a
        # license is provisioned — gitleaks output is still visible
        # in the run logs.
        continue-on-error: true
