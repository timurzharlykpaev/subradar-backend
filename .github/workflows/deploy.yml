name: Deploy

on:
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'prod or dev'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Environment protection is driven by the computed target below.
    # When target == 'prod' and the 'prod' environment has required reviewers
    # configured in GitHub Settings, the job pauses for manual approval before
    # any deploy steps run. See .github/ENVIRONMENT_SETUP.md.
    # NOTE: environment.name is evaluated at job-start, BEFORE any step runs,
    # so it cannot reference `steps.*`. Recomputed here using only job-level
    # contexts. Keep in sync with the "Set environment" step below.
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
    permissions:
      contents: read
      packages: write

    # Ephemeral services for the test step. Only reachable inside this job.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "target=$INPUT_ENV" >> $GITHUB_OUTPUT
          elif [ "$REF_NAME" = "main" ]; then
            echo "target=prod" >> $GITHUB_OUTPUT
          else
            echo "target=dev" >> $GITHUB_OUTPUT
          fi

      # --- Quality gates BEFORE any image push / deploy ---
      # Running tests and the TS type-check here prevents shipping a broken
      # image. If this step fails, nothing downstream (build / push / ssh)
      # executes — the deploy is effectively atomic w.r.t. test signal.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379

      - name: Type check
        run: npx tsc --noEmit

      # --- Image build + push (only after gates pass) ---
      - uses: docker/setup-buildx-action@v3.10.0
      - uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: timurzharlykpaev
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push dev image
        if: steps.env.outputs.target == 'dev'
        uses: docker/build-push-action@v6.15.0
        with:
          push: true
          tags: ghcr.io/timurzharlykpaev/subradar-backend:dev

      - name: Build & push prod image
        if: steps.env.outputs.target == 'prod'
        uses: docker/build-push-action@v6.15.0
        with:
          push: true
          tags: ghcr.io/timurzharlykpaev/subradar-backend:latest

      - name: Write .env.prod to server
        if: steps.env.outputs.target == 'prod'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /opt/subradar/.env.prod << 'ENVEOF'
            NODE_ENV=production
            PORT=8080
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DB_HOST=dbaas-db-4327922-do-user-30639355-0.f.db.ondigitalocean.com
            DB_PORT=25060
            DB_USERNAME=doadmin
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_DATABASE=subradar
            DB_SSL=true
            REDIS_URL=redis://subradar-redis:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_EXPIRES_IN=7d
            JWT_REFRESH_EXPIRES_IN=30d
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://api.subradar.ai/api/v1/auth/google/callback
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=gpt-4o
            DO_SPACES_KEY=${{ secrets.DO_SPACES_KEY }}
            DO_SPACES_SECRET=${{ secrets.DO_SPACES_SECRET }}
            DO_SPACES_BUCKET=steptogoal
            DO_SPACES_REGION=fra1
            DO_SPACES_ENDPOINT=https://fra1.digitaloceanspaces.com
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL=noreply@subradar.ai
            FRONTEND_URL=https://app.subradar.ai
            CORS_ORIGINS=https://app.subradar.ai
            APP_URL=https://app.subradar.ai
            NODE_TLS_REJECT_UNAUTHORIZED=0
            LEMON_SQUEEZY_API_KEY=${{ secrets.LEMON_SQUEEZY_API_KEY }}
            LEMON_SQUEEZY_WEBHOOK_SECRET=${{ secrets.LEMON_SQUEEZY_WEBHOOK_SECRET }}
            LEMON_SQUEEZY_STORE_ID=${{ secrets.LEMON_SQUEEZY_STORE_ID }}
            LEMON_SQUEEZY_PRO_MONTHLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_PRO_MONTHLY_VARIANT_ID }}
            LEMON_SQUEEZY_PRO_YEARLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_PRO_YEARLY_VARIANT_ID }}
            LEMON_SQUEEZY_TEAM_MONTHLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_TEAM_MONTHLY_VARIANT_ID }}
            LEMON_SQUEEZY_TEAM_YEARLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_TEAM_YEARLY_VARIANT_ID }}
            REVENUECAT_WEBHOOK_SECRET=${{ secrets.REVENUECAT_WEBHOOK_SECRET }}
            REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            ENVEOF
            echo "✅ .env.prod updated"

      - name: Write .env.dev to server
        if: steps.env.outputs.target == 'dev'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /opt/subradar/.env.dev << 'ENVEOF'
            NODE_ENV=development
            PORT=8080
            DATABASE_URL=postgresql://doadmin:${{ secrets.DB_PASSWORD }}@dbaas-db-4327922-do-user-30639355-0.f.db.ondigitalocean.com:25060/subradar_dev?sslmode=require
            DB_HOST=dbaas-db-4327922-do-user-30639355-0.f.db.ondigitalocean.com
            DB_PORT=25060
            DB_USERNAME=doadmin
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_DATABASE=subradar_dev
            DB_SSL=true
            REDIS_URL=redis://subradar-redis:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_EXPIRES_IN=7d
            JWT_REFRESH_EXPIRES_IN=30d
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://api-dev.subradar.ai/api/v1/auth/google/callback
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=gpt-4o
            DO_SPACES_KEY=${{ secrets.DO_SPACES_KEY }}
            DO_SPACES_SECRET=${{ secrets.DO_SPACES_SECRET }}
            DO_SPACES_BUCKET=steptogoal
            DO_SPACES_REGION=fra1
            DO_SPACES_ENDPOINT=https://fra1.digitaloceanspaces.com
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL=noreply@subradar.ai
            FRONTEND_URL=https://app-dev.subradar.ai
            CORS_ORIGINS=https://app-dev.subradar.ai,http://localhost:5173
            APP_URL=https://app-dev.subradar.ai
            NODE_TLS_REJECT_UNAUTHORIZED=0
            LEMON_SQUEEZY_API_KEY=${{ secrets.LEMON_SQUEEZY_API_KEY }}
            LEMON_SQUEEZY_WEBHOOK_SECRET=${{ secrets.LEMON_SQUEEZY_WEBHOOK_SECRET }}
            LEMON_SQUEEZY_STORE_ID=${{ secrets.LEMON_SQUEEZY_STORE_ID }}
            LEMON_SQUEEZY_PRO_MONTHLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_PRO_MONTHLY_VARIANT_ID }}
            LEMON_SQUEEZY_PRO_YEARLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_PRO_YEARLY_VARIANT_ID }}
            LEMON_SQUEEZY_TEAM_MONTHLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_TEAM_MONTHLY_VARIANT_ID }}
            LEMON_SQUEEZY_TEAM_YEARLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_TEAM_YEARLY_VARIANT_ID }}
            REVENUECAT_WEBHOOK_SECRET=${{ secrets.REVENUECAT_WEBHOOK_SECRET }}
            REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            ENVEOF
            echo "✅ .env.dev updated"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            TARGET="${{ steps.env.outputs.target }}"
            cd /opt/subradar
            CONTAINER="subradar-api-${TARGET}"
            LOCK="/tmp/deploy_locks/${CONTAINER}"
            mkdir -p /tmp/deploy_locks
            touch "$LOCK"
            trap "rm -f $LOCK" EXIT

            docker rm -f $(docker ps -aq --filter "name=${CONTAINER}" --filter "status=created") 2>/dev/null || true
            docker rm -f $(docker ps -aq --filter "name=${CONTAINER}" --filter "status=exited") 2>/dev/null || true

            if [ "$TARGET" = "prod" ]; then
              docker compose pull subradar-api-prod
              docker compose up -d --force-recreate --no-deps subradar-api-prod
              echo "✅ subradar-api-prod deployed"
            else
              docker compose pull subradar-api-dev
              docker compose up -d --force-recreate --no-deps subradar-api-dev
              echo "✅ subradar-api-dev deployed"
            fi
            docker image prune -f
            rm -f "$LOCK"
        env:
          TARGET: ${{ steps.env.outputs.target }}
