name: Deploy

on:
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'prod or dev'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Environment protection is driven by the computed target below.
    # When target == 'prod' and the 'prod' environment has required reviewers
    # configured in GitHub Settings, the job pauses for manual approval before
    # any deploy steps run. See .github/ENVIRONMENT_SETUP.md.
    # NOTE: environment.name is evaluated at job-start, BEFORE any step runs,
    # so it cannot reference `steps.*`. Recomputed here using only job-level
    # contexts. Keep in sync with the "Set environment" step below.
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
    permissions:
      contents: read
      packages: write

    # Ephemeral services for the test step. Only reachable inside this job.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "target=$INPUT_ENV" >> $GITHUB_OUTPUT
          elif [ "$REF_NAME" = "main" ]; then
            echo "target=prod" >> $GITHUB_OUTPUT
          else
            echo "target=dev" >> $GITHUB_OUTPUT
          fi

      # --- Quality gates BEFORE any image push / deploy ---
      # Running tests and the TS type-check here prevents shipping a broken
      # image. If this step fails, nothing downstream (build / push / ssh)
      # executes — the deploy is effectively atomic w.r.t. test signal.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379

      - name: Type check
        run: npx tsc --noEmit

      # --- Image build + push (only after gates pass) ---
      - uses: docker/setup-buildx-action@v3.10.0
      - uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: timurzharlykpaev
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push dev image
        if: steps.env.outputs.target == 'dev'
        uses: docker/build-push-action@v6.15.0
        with:
          push: true
          tags: ghcr.io/timurzharlykpaev/subradar-backend:dev

      - name: Build & push prod image
        if: steps.env.outputs.target == 'prod'
        uses: docker/build-push-action@v6.15.0
        with:
          push: true
          tags: ghcr.io/timurzharlykpaev/subradar-backend:latest

      - name: Write .env.prod to server
        if: steps.env.outputs.target == 'prod'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /opt/subradar/.env.prod << 'ENVEOF'
            NODE_ENV=production
            PORT=8080
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DB_HOST=dbaas-db-4327922-do-user-30639355-0.f.db.ondigitalocean.com
            DB_PORT=25060
            DB_USERNAME=doadmin
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_DATABASE=subradar
            DB_SSL=true
            REDIS_URL=redis://subradar-redis:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_EXPIRES_IN=7d
            JWT_REFRESH_EXPIRES_IN=30d
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://api.subradar.ai/api/v1/auth/google/callback
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=gpt-4o
            DO_SPACES_KEY=${{ secrets.DO_SPACES_KEY }}
            DO_SPACES_SECRET=${{ secrets.DO_SPACES_SECRET }}
            DO_SPACES_BUCKET=steptogoal
            DO_SPACES_REGION=fra1
            DO_SPACES_ENDPOINT=https://fra1.digitaloceanspaces.com
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL=noreply@subradar.ai
            FRONTEND_URL=https://app.subradar.ai
            CORS_ORIGINS=https://app.subradar.ai
            APP_URL=https://app.subradar.ai
            NODE_TLS_REJECT_UNAUTHORIZED=0
            LEMON_SQUEEZY_API_KEY=${{ secrets.LEMON_SQUEEZY_API_KEY }}
            LEMON_SQUEEZY_WEBHOOK_SECRET=${{ secrets.LEMON_SQUEEZY_WEBHOOK_SECRET }}
            LEMON_SQUEEZY_STORE_ID=${{ secrets.LEMON_SQUEEZY_STORE_ID }}
            LEMON_SQUEEZY_PRO_MONTHLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_PRO_MONTHLY_VARIANT_ID }}
            LEMON_SQUEEZY_PRO_YEARLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_PRO_YEARLY_VARIANT_ID }}
            LEMON_SQUEEZY_TEAM_MONTHLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_TEAM_MONTHLY_VARIANT_ID }}
            LEMON_SQUEEZY_TEAM_YEARLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_TEAM_YEARLY_VARIANT_ID }}
            REVENUECAT_WEBHOOK_SECRET=${{ secrets.REVENUECAT_WEBHOOK_SECRET }}
            REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}
            RESEND_WEBHOOK_SECRET=${{ secrets.RESEND_WEBHOOK_SECRET }}
            BILLING_HEALTH_TOKEN=${{ secrets.BILLING_HEALTH_TOKEN }}
            BILLING_RECONCILIATION_ENABLED=${{ vars.BILLING_RECONCILIATION_ENABLED || 'false' }}
            BILLING_RECONCILIATION_DRY_RUN=${{ vars.BILLING_RECONCILIATION_DRY_RUN || 'true' }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            ENVEOF
            echo "✅ .env.prod updated"

      - name: Write .env.dev to server
        if: steps.env.outputs.target == 'dev'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /opt/subradar/.env.dev << 'ENVEOF'
            NODE_ENV=development
            PORT=8080
            DATABASE_URL=postgresql://doadmin:${{ secrets.DB_PASSWORD }}@dbaas-db-4327922-do-user-30639355-0.f.db.ondigitalocean.com:25060/subradar_dev?sslmode=require
            DB_HOST=dbaas-db-4327922-do-user-30639355-0.f.db.ondigitalocean.com
            DB_PORT=25060
            DB_USERNAME=doadmin
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_DATABASE=subradar_dev
            DB_SSL=true
            REDIS_URL=redis://subradar-redis:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_EXPIRES_IN=7d
            JWT_REFRESH_EXPIRES_IN=30d
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://api-dev.subradar.ai/api/v1/auth/google/callback
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=gpt-4o
            DO_SPACES_KEY=${{ secrets.DO_SPACES_KEY }}
            DO_SPACES_SECRET=${{ secrets.DO_SPACES_SECRET }}
            DO_SPACES_BUCKET=steptogoal
            DO_SPACES_REGION=fra1
            DO_SPACES_ENDPOINT=https://fra1.digitaloceanspaces.com
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL=noreply@subradar.ai
            FRONTEND_URL=https://app-dev.subradar.ai
            CORS_ORIGINS=https://app-dev.subradar.ai,http://localhost:5173
            APP_URL=https://app-dev.subradar.ai
            NODE_TLS_REJECT_UNAUTHORIZED=0
            LEMON_SQUEEZY_API_KEY=${{ secrets.LEMON_SQUEEZY_API_KEY }}
            LEMON_SQUEEZY_WEBHOOK_SECRET=${{ secrets.LEMON_SQUEEZY_WEBHOOK_SECRET }}
            LEMON_SQUEEZY_STORE_ID=${{ secrets.LEMON_SQUEEZY_STORE_ID }}
            LEMON_SQUEEZY_PRO_MONTHLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_PRO_MONTHLY_VARIANT_ID }}
            LEMON_SQUEEZY_PRO_YEARLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_PRO_YEARLY_VARIANT_ID }}
            LEMON_SQUEEZY_TEAM_MONTHLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_TEAM_MONTHLY_VARIANT_ID }}
            LEMON_SQUEEZY_TEAM_YEARLY_VARIANT_ID=${{ secrets.LEMON_SQUEEZY_TEAM_YEARLY_VARIANT_ID }}
            REVENUECAT_WEBHOOK_SECRET=${{ secrets.REVENUECAT_WEBHOOK_SECRET }}
            REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}
            RESEND_WEBHOOK_SECRET=${{ secrets.RESEND_WEBHOOK_SECRET }}
            BILLING_HEALTH_TOKEN=${{ secrets.BILLING_HEALTH_TOKEN }}
            BILLING_RECONCILIATION_ENABLED=${{ vars.BILLING_RECONCILIATION_ENABLED || 'false' }}
            BILLING_RECONCILIATION_DRY_RUN=${{ vars.BILLING_RECONCILIATION_DRY_RUN || 'true' }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            ENVEOF
            echo "✅ .env.dev updated"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Fail-fast health gate + auto-rollback. Before this existed the
          # workflow returned green the moment `docker compose up -d` queued
          # the container — a Nest DI error on boot would crash-loop for
          # hours while GitHub reported ✅ and nginx served 502.
          #
          # Zero-downtime note: this is still stop-old → start-new, so
          # there's a short (~10-30 s) window of 502s during recreate. A
          # proper blue/green on a single host needs two named slots behind
          # an nginx upstream with failover — tracked for a follow-up PR.
          script: |
            set -euo pipefail
            TARGET="${{ steps.env.outputs.target }}"
            cd /opt/subradar
            CONTAINER="subradar-api-${TARGET}"
            LOCK="/tmp/deploy_locks/${CONTAINER}"
            mkdir -p /tmp/deploy_locks
            touch "$LOCK"
            trap "rm -f $LOCK" EXIT

            if [ "$TARGET" = "prod" ]; then
              IMAGE="ghcr.io/timurzharlykpaev/subradar-backend:latest"
              ROLLBACK_TAG="ghcr.io/timurzharlykpaev/subradar-backend:prod-previous"
            else
              IMAGE="ghcr.io/timurzharlykpaev/subradar-backend:dev"
              ROLLBACK_TAG="ghcr.io/timurzharlykpaev/subradar-backend:dev-previous"
            fi

            # Snapshot the currently-running image locally so we can roll
            # back to exactly what was serving traffic. Uses the image ID,
            # not the floating :latest/:dev tag — those will have moved by
            # the time we decide to roll back.
            PREV_IMAGE_ID=$(docker inspect --format='{{.Image}}' "$CONTAINER" 2>/dev/null || echo "")
            if [ -n "$PREV_IMAGE_ID" ]; then
              docker tag "$PREV_IMAGE_ID" "$ROLLBACK_TAG" || true
              echo "📌 Rollback tag set: $ROLLBACK_TAG -> $PREV_IMAGE_ID"
            fi

            docker rm -f $(docker ps -aq --filter "name=${CONTAINER}" --filter "status=created") 2>/dev/null || true
            docker rm -f $(docker ps -aq --filter "name=${CONTAINER}" --filter "status=exited") 2>/dev/null || true

            docker compose pull "$CONTAINER"
            docker compose up -d --force-recreate --no-deps "$CONTAINER"
            echo "🚀 $CONTAINER recreated — waiting for healthcheck…"

            # Poll docker health for up to 120 s. Bail early on crash-loop
            # (restarts > 3) so we don't burn the full timeout on a boot
            # error that will never resolve itself.
            TIMEOUT=120
            ELAPSED=0
            HEALTHY=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              STATE=$(docker inspect --format='{{.State.Status}}' "$CONTAINER" 2>/dev/null || echo missing)
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo none)
              RESTARTS=$(docker inspect --format='{{.RestartCount}}' "$CONTAINER" 2>/dev/null || echo 0)
              echo "[${ELAPSED}s] state=$STATE health=$HEALTH restarts=$RESTARTS"
              if [ "$HEALTH" = "healthy" ]; then
                HEALTHY=1
                break
              fi
              if [ "$RESTARTS" -gt 3 ]; then
                echo "❌ $CONTAINER is crash-looping ($RESTARTS restarts)."
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            if [ "$HEALTHY" != "1" ]; then
              echo "────── $CONTAINER logs (last 120 lines) ──────"
              docker logs --tail 120 "$CONTAINER" 2>&1 || true
              echo "──────────────────────────────────────────────"

              if docker image inspect "$ROLLBACK_TAG" >/dev/null 2>&1; then
                echo "↩️  Rolling back $CONTAINER to $ROLLBACK_TAG"
                # Retag rollback image onto the floating tag so compose picks
                # it up without a new pull, then recreate.
                docker tag "$ROLLBACK_TAG" "$IMAGE"
                docker compose up -d --force-recreate --no-deps "$CONTAINER"
                echo "↩️  Rollback complete — failing the deploy anyway so CI is red."
              else
                echo "⚠️  No rollback image available for $TARGET."
              fi
              exit 1
            fi

            echo "✅ $CONTAINER healthy"
            # Best-effort image cleanup — never fail the deploy on it. When
            # main and dev pipelines run in parallel, one prune can already
            # be in flight ("a prune operation is already running"); the
            # other run will clean up next time.
            docker image prune -f || echo "image prune skipped (race with another deploy)"
            rm -f "$LOCK"
        env:
          TARGET: ${{ steps.env.outputs.target }}
