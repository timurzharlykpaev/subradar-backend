name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'prod or dev'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: timurzharlykpaev
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build & push dev
        if: github.event_name == 'push' || github.event.inputs.environment == 'dev'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/timurzharlykpaev/subradar-backend:dev
      - name: Build & push prod
        if: github.event.inputs.environment == 'prod'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/timurzharlykpaev/subradar-backend:latest
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.101.197.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/subradar
            if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
              docker compose pull subradar-api-prod
              docker compose up -d subradar-api-prod
            else
              docker compose pull subradar-api-dev
              docker compose up -d subradar-api-dev
            fi
            docker image prune -f
