# Dependabot config — closes ASVS V14.1.1 / V14.1.3.
#
# Weekly cadence keeps the noise down (security advisories already trigger
# out-of-cycle PRs) while still hitting routine point-releases. CASA
# reviewers want evidence that vulnerable dependencies are picked up in a
# bounded time window — weekly + automatic security alerts satisfies that.
#
# Grouping: lockfile-only updates land as one PR per week per ecosystem
# instead of one PR per package, so the team review burden stays sane.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      # Keep all minor + patch updates in a single weekly PR.
      production-deps:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch
    # Major updates still come as individual PRs so we can review them
    # one-by-one (semver-major is where breaking changes happen).
    versioning-strategy: increase
    # Ignore semver-major bumps for packages that have a history of
    # breaking the build. Dependabot still files security advisories
    # for these via GitHub's vulnerability alerts, but routine major
    # version bumps stay out of the queue. To take a major bump,
    # remove the package from this list, run `npm install <pkg>@latest`
    # locally, fix any breaks, and ship as a normal feature commit.
    # Lessons that produced this list:
    #   - typescript@6: enabled `strictPropertyInitialization` by
    #     default, broke entity files repo-wide.
    #   - uuid@14: ESM-only, breaks CommonJS imports.
    #   - eslint@10 / @eslint/js@10: peer-pinned to eslint@^10, so
    #     bumping @eslint/js while eslint stays at 9.x makes
    #     `npm ci` fail with ERESOLVE on the deploy runner.
    #   - @types/node@25: forced types/lib mismatches that fired
    #     strict-mode errors in TS 5/6.
    ignore:
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
      - dependency-name: uuid
        update-types: ['version-update:semver-major']
      - dependency-name: eslint
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(actions)
