version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subradar-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://subradar:${DB_PASSWORD:-password}@postgres:5432/subradar
      REDIS_URL: redis://redis:6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: subradar
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: subradar
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://fra1.digitaloceanspaces.com}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-subradar}
      LEMON_SQUEEZY_API_KEY: ${LEMON_SQUEEZY_API_KEY}
      LEMON_SQUEEZY_WEBHOOK_SECRET: ${LEMON_SQUEEZY_WEBHOOK_SECRET}
      LEMON_SQUEEZY_STORE_ID: ${LEMON_SQUEEZY_STORE_ID}
      LEMON_SQUEEZY_PRO_VARIANT_ID: ${LEMON_SQUEEZY_PRO_VARIANT_ID}
      LEMON_SQUEEZY_TEAM_VARIANT_ID: ${LEMON_SQUEEZY_TEAM_VARIANT_ID}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.subradar.ai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: subradar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: subradar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: subradar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subradar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: subradar-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
